---
layout: default
---
<div class="blog-layout">
  <div class="site-header">
    <h1><a href="{{ '/' | relative_url }}">Tom Hughes-Croucher</a> <span class="antiem">aka sh1mmer</span></h1>
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/blog/' | relative_url }}">Blog</a>
    </nav>
  </div>

  <article>
    <h2>{{ page.title }}</h2>
    <div class="post-meta">{{ page.date | date: "%B %d, %Y" }}</div>
    <div class="post-content">
      {{ content }}
    </div>
  </article>

  <a class="back-link" href="{{ '/blog/' | relative_url }}">&larr; Back to blog</a>
</div>
