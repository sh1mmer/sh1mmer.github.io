---
layout: home
---
<div class="section blog-section">
  <h2>Blog</h2>
  <div class="blog-content">
    <h3>{{ page.title }}</h3>
    <div class="post-date">{{ page.date | date: "%B %d, %Y" }}</div>
    <div class="post-content">
      {{ content }}
    </div>
    <a class="back-link" href="{{ '/blog/' | relative_url }}">&larr; Back to blog</a>
  </div>
</div>
